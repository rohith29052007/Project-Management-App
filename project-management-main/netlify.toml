[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# SPA routing - redirect all non-existent paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ensure auth callbacks work
[[redirects]]
  from = "/auth/*"
  to = "/index.html"
  status = 200

